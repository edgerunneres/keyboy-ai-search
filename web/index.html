<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KeyBoy 智能专业搜索引擎</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="side-panel">
        <div class="brand">
          <div class="brand-mark">K</div>
          <div>
            <h1>KeyBoy</h1>
            <p>LLM 多智能体研究系统</p>
          </div>
        </div>

        <section class="panel">
          <h2>研究配置</h2>
          <div class="metric-grid">
            <div><span id="docCount">-</span><small>文档</small></div>
            <div><span id="vocabCount">-</span><small>词项</small></div>
          </div>
          <label class="check-row">
            <input id="onlineToggle" type="checkbox" checked />
            <span>启用在线研究源</span>
          </label>
          <label for="sourceFilter">来源</label>
          <select id="sourceFilter"></select>
          <label for="categoryFilter">主题</label>
          <select id="categoryFilter"></select>
        </section>

        <section class="panel">
          <h2>演示查询</h2>
          <button class="example" data-query="Agentic RAG GraphRAG LightRAG Self-RAG 最新研究怎么整合到课程项目">Agentic RAG 前沿整合</button>
          <button class="example" data-query="大模型多智能体在线研究系统应该如何设计">多智能体系统设计</button>
          <button class="example" data-query="GraphRAG 和 LightRAG 相比普通 RAG 强在哪里">GraphRAG / LightRAG 对比</button>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h2>Agentic Deep Research</h2>
            <p id="statusText">正在初始化多智能体研究系统...</p>
          </div>
          <div class="mode-switch" role="group" aria-label="检索模式">
            <button class="active" data-mode="research">Research</button>
            <button data-mode="local">Local</button>
            <button data-mode="search">Search</button>
          </div>
        </header>

        <form id="searchForm" class="searchbar">
          <input id="queryInput" autocomplete="off" value="Agentic RAG GraphRAG LightRAG Self-RAG 最新研究怎么整合到课程项目" />
          <button type="submit">研究</button>
        </form>

        <section class="answer-panel">
          <div class="answer-head">
          <h2>研究答案</h2>
            <span id="latencyBadge">- ms</span>
          </div>
          <p id="summaryText">输入研究问题后，多智能体将规划、检索、阅读、合成并校验答案。</p>
          <ul id="insightList"></ul>
        </section>

        <section class="results-head">
          <h2>证据来源</h2>
          <span id="resultCount">0 条</span>
        </section>
        <section id="results" class="results"></section>
      </section>

      <aside class="right-panel">
        <section class="panel">
          <h2>研究计划</h2>
          <dl id="profileList"></dl>
        </section>
        <section class="panel">
          <h2>Agent Trace</h2>
          <div id="traceList" class="trace-list"></div>
        </section>
        <section class="panel">
          <h2>模型与质量</h2>
          <dl id="qualityList"></dl>
          <div id="riskList" class="risk-list"></div>
        </section>
      </aside>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
