<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KeyBoy 智能专业搜索引擎</title>
    <link rel="stylesheet" href="/style.css?v=20260618-format2" />
  </head>
  <body>
    <div class="scene-bg">
      <div class="grid-plane"></div>
      <div class="type-ghost">KEYBOY</div>
      <div class="signal-line signal-line-a"></div>
      <div class="signal-line signal-line-b"></div>
    </div>

    <main class="stage">
      <header class="floating-top">
        <div class="brand">
          <div class="brand-mark">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
          </div>
          <div>
            <h1>KeyBoy</h1>
            <p>Agentic Deep Research</p>
          </div>
        </div>

        <div class="top-actions">
          <span id="docCount" class="pill">- docs</span>
          <span id="modelState" class="pill">本地 fallback</span>
          <button type="button" class="ghost-btn" data-drawer="sources">在线源</button>
          <button type="button" class="ghost-btn" data-drawer="model">模型</button>
        </div>
      </header>

      <section class="command-float">
        <form id="searchForm" class="query-form">
          <input id="queryInput" autocomplete="off" />
          <button id="submitBtn" type="submit">研究</button>
        </form>
        <div class="command-meta">
          <label class="toggle-switch">
            <input id="onlineToggle" type="checkbox" checked />
            <span class="toggle-slider"></span>
            <span>在线资料</span>
          </label>
          <span id="statusText">初始化中</span>
        </div>
      </section>

      <section class="answer-stage" aria-label="研究答案">
        <div id="loadingState" class="thinking hidden">
          <span></span>
          <span></span>
          <span></span>
          <p>研究中</p>
        </div>
        <div id="summaryText" class="answer-text">输入问题后开始研究。</div>
        <ul id="insightList" class="insight-list"></ul>
      </section>

      <nav id="resultActions" class="result-actions hidden" aria-label="研究结果操作">
        <button type="button" class="result-btn" data-drawer="evidence">
          <span>证据</span>
          <strong id="resultCount">0</strong>
        </button>
        <button type="button" class="result-btn" data-drawer="plan">计划</button>
        <button type="button" class="result-btn" data-drawer="trace">过程</button>
        <button type="button" class="result-btn" data-drawer="quality">质量</button>
        <span id="latencyBadge" class="latency">- ms</span>
      </nav>
    </main>

    <div id="drawerOverlay" class="drawer-overlay hidden">
      <aside class="drawer" aria-label="详细面板">
        <div class="drawer-head">
          <h2 id="drawerTitle">详情</h2>
          <button id="drawerClose" type="button" class="close-btn" aria-label="关闭">×</button>
        </div>

        <section id="drawerModel" class="drawer-view">
          <div class="field-grid">
            <label>
              <span>平台</span>
              <select id="providerSelect">
                <option value="bailian">阿里云百炼</option>
                <option value="custom">OpenAI 兼容</option>
              </select>
            </label>
            <label>
              <span>API Key</span>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="DashScope API Key" />
            </label>
            <label>
              <span>Base URL</span>
              <input id="baseUrlInput" autocomplete="off" value="https://dashscope.aliyuncs.com/compatible-mode/v1" />
            </label>
            <label>
              <span>模型</span>
              <input id="modelInput" autocomplete="off" value="qwen-plus" />
            </label>
            <label>
              <span>超时</span>
              <input id="timeoutInput" type="number" min="3" max="120" value="60" />
            </label>
            <label class="check-control">
              <input id="thinkingToggle" type="checkbox" />
              <span>Thinking</span>
            </label>
            <button id="saveModelBtn" type="button" class="primary-btn">保存模型配置</button>
          </div>
          <p id="modelMessage" class="drawer-note">未配置远程模型</p>
        </section>

        <section id="drawerSources" class="drawer-view hidden">
          <div class="field-grid">
            <label>
              <span>Semantic Scholar API Key</span>
              <input id="semanticScholarKeyInput" type="password" autocomplete="off" placeholder="可选，解除更严格限流" />
            </label>
            <label>
              <span>OpenAlex API Key</span>
              <input id="openAlexKeyInput" type="password" autocomplete="off" placeholder="可选，适用于付费/授权账号" />
            </label>
            <label>
              <span>OpenAlex Mailto</span>
              <input id="openAlexMailtoInput" autocomplete="off" value="yup300737@gmail.com" placeholder="yup300737@gmail.com" />
            </label>
            <label>
              <span>Crossref Mailto</span>
              <input id="crossrefMailtoInput" autocomplete="off" value="yup300737@gmail.com" placeholder="yup300737@gmail.com" />
            </label>
            <label>
              <span>在线源超时</span>
              <input id="sourceTimeoutInput" type="number" min="3" max="60" value="15" />
            </label>
            <label>
              <span>每源数量</span>
              <input id="perSourceLimitInput" type="number" min="1" max="8" value="5" />
            </label>
            <button id="saveSourcesBtn" type="button" class="primary-btn">保存在线源配置</button>
          </div>
          <p id="sourcesMessage" class="drawer-note">arXiv/Crossref 无需 Key；Semantic Scholar 建议配置 API Key。</p>
        </section>

        <section id="drawerEvidence" class="drawer-view hidden">
          <div id="results" class="evidence-list"></div>
        </section>

        <section id="drawerPlan" class="drawer-view hidden">
          <dl id="profileList"></dl>
        </section>

        <section id="drawerTrace" class="drawer-view hidden">
          <div id="traceList" class="trace-list"></div>
        </section>

        <section id="drawerQuality" class="drawer-view hidden">
          <dl id="qualityList"></dl>
          <div class="drawer-subhead">
            <span id="riskBadge">0 条风险</span>
          </div>
          <div id="riskList" class="risk-list"></div>
        </section>
      </aside>
    </div>

    <script src="/app.js?v=20260618-format2"></script>
  </body>
</html>
