<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KeyBoy 智能专业搜索引擎</title>
    <link rel="stylesheet" href="/style.css?v=20260618-format2" />
  </head>
  <body>
    <div class="scene-bg">
      <div class="grid-plane"></div>
      <div class="type-ghost">KEYBOY</div>
      <div class="signal-line signal-line-a"></div>
      <div class="signal-line signal-line-b"></div>
    </div>

    <main class="stage">
      <header class="floating-top">
        <div class="brand">
          <div class="brand-mark">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
          </div>
          <div>
            <h1>KeyBoy</h1>
            <p>Agentic Deep Research</p>
          </div>
        </div>

        <div class="top-actions">
          <label class="toggle-switch">
            <input id="onlineToggle" type="checkbox" checked />
            <span class="toggle-slider"></span>
            <span>在线资料</span>
          </label>
          <span id="docCount" class="pill">- docs</span>
          <span id="modelState" class="pill">本地 fallback</span>
          <button type="button" class="ghost-btn" data-drawer="sources">在线源</button>
          <button type="button" class="ghost-btn" data-drawer="model">模型</button>
        </div>
      </header>

      <div id="dockContainer" class="dock-container">
        <section class="command-float" id="commandFloat">
          <form id="searchForm" class="query-form">
            <input id="queryInput" autocomplete="off" placeholder="探索未知的知识..." />
            <button id="submitBtn" type="submit">研究</button>
          </form>
        </section>
      </div>

      <div id="chatHistory" class="chat-history" aria-label="研究对话">
        <div id="initialHero" class="initial-hero">
          <div class="answer-text">输入问题后开始研究。</div>
        </div>
      </div>
    </main>

    <template id="chatItemTemplate">
      <div class="chat-item">
        <div class="user-bubble">
          <h2 class="user-query"></h2>
        </div>
        <div class="ai-bubble answer-stage">
          <div class="thinking hidden">
            <div style="display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--blue);">
              <span></span><span></span><span></span>
              <p class="status-text" style="margin:0;">初始化研究流程...</p>
            </div>
            <ul class="progress-steps" style="list-style: none; padding-left: 16px; margin: 12px 0 12px 6px; border-left: 2px solid rgba(0, 113, 227, 0.2); font-size: 14px; color: var(--muted); display: grid; gap: 8px;"></ul>
          </div>
          <div class="answer-text"></div>
          <ul class="insight-list"></ul>

          <div class="feedback-toolbar hidden">
            <button type="button" class="icon-btn copy-btn" aria-label="复制结果">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <span class="btn-text copy-text">复制</span>
            </button>
            <div class="feedback-votes">
              <button type="button" class="icon-btn vote-btn upvote-btn" aria-label="有用">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
              </button>
              <button type="button" class="icon-btn vote-btn downvote-btn" aria-label="无用">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path></svg>
              </button>
            </div>
          </div>

          <div class="followup-container hidden">
            <p class="followup-title">继续探索：</p>
            <div class="followup-list"></div>
          </div>

          <nav class="result-actions hidden" aria-label="研究结果操作">
            <button type="button" class="result-btn drawer-btn" data-drawer="evidence">
              <span>证据</span>
              <strong class="result-count">0</strong>
            </button>
            <button type="button" class="result-btn drawer-btn" data-drawer="plan">计划</button>
            <button type="button" class="result-btn drawer-btn" data-drawer="trace">过程</button>
            <button type="button" class="result-btn drawer-btn" data-drawer="quality">质量</button>
            <span class="latency">- ms</span>
          </nav>
        </div>
      </div>
    </template>

    <div id="drawerOverlay" class="drawer-overlay hidden">
      <aside class="drawer" aria-label="详细面板">
        <div class="drawer-head">
          <h2 id="drawerTitle">详情</h2>
          <button id="drawerClose" type="button" class="close-btn" aria-label="关闭">×</button>
        </div>

        <section id="drawerModel" class="drawer-view">
          <div class="field-grid">
            <label>
              <span>平台</span>
              <select id="providerSelect">
                <option value="bailian">阿里云百炼</option>
                <option value="custom">OpenAI 兼容</option>
              </select>
            </label>
            <label>
              <span>API Key</span>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="DashScope API Key" />
            </label>
            <label>
              <span>Base URL</span>
              <input id="baseUrlInput" autocomplete="off" value="https://dashscope.aliyuncs.com/compatible-mode/v1" />
            </label>
            <label>
              <span>模型</span>
              <input id="modelInput" autocomplete="off" value="qwen-plus" />
            </label>
            <label>
              <span>超时</span>
              <input id="timeoutInput" type="number" min="3" max="120" value="60" />
            </label>
            <label class="check-control">
              <input id="thinkingToggle" type="checkbox" />
              <span>Thinking</span>
            </label>
            <button id="saveModelBtn" type="button" class="primary-btn">保存模型配置</button>
          </div>
          <p id="modelMessage" class="drawer-note">未配置远程模型</p>
        </section>

        <section id="drawerSources" class="drawer-view hidden">
          <div class="field-grid">
            <label>
              <span>Semantic Scholar API Key</span>
              <input id="semanticScholarKeyInput" type="password" autocomplete="off" placeholder="可选，解除更严格限流" />
            </label>
            <label>
              <span>OpenAlex API Key</span>
              <input id="openAlexKeyInput" type="password" autocomplete="off" placeholder="可选，适用于付费/授权账号" />
            </label>
            <label>
              <span>OpenAlex Mailto</span>
              <input id="openAlexMailtoInput" autocomplete="off" value="yup300737@gmail.com" placeholder="yup300737@gmail.com" />
            </label>
            <label>
              <span>Crossref Mailto</span>
              <input id="crossrefMailtoInput" autocomplete="off" value="yup300737@gmail.com" placeholder="yup300737@gmail.com" />
            </label>
            <label>
              <span>在线源超时</span>
              <input id="sourceTimeoutInput" type="number" min="3" max="60" value="15" />
            </label>
            <label>
              <span>每源数量</span>
              <input id="perSourceLimitInput" type="number" min="1" max="8" value="5" />
            </label>
            <button id="saveSourcesBtn" type="button" class="primary-btn">保存在线源配置</button>
          </div>
          <p id="sourcesMessage" class="drawer-note">arXiv/Crossref 无需 Key；Semantic Scholar 建议配置 API Key。</p>
        </section>

        <section id="drawerEvidence" class="drawer-view hidden">
          <div id="results" class="evidence-list"></div>
        </section>

        <section id="drawerPlan" class="drawer-view hidden">
          <dl id="profileList"></dl>
        </section>

        <section id="drawerTrace" class="drawer-view hidden">
          <div id="traceList" class="trace-list"></div>
        </section>

        <section id="drawerQuality" class="drawer-view hidden">
          <dl id="qualityList"></dl>
          <div class="drawer-subhead">
            <span id="riskBadge">0 条风险</span>
          </div>
          <div id="riskList" class="risk-list"></div>
        </section>
      </aside>
    </div>

    <script src="/app.js?v=20260618-format2"></script>
  </body>
</html>
